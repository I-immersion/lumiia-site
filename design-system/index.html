  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* devanagari */\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"67ff1fc0-23aa-4e5a-b4b5-bbe3710bcd47\") format('woff2');\n  unicode-range: U+0900-097F, U+1CD0-1CF9, U+200C-200D, U+20A8, U+20B9, U+20F0, U+25CC, U+A830-A839, U+A8E0-A8FF, U+11B00-11B09;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"563e5282-e554-4658-b2e9-c1a9d619a4fc\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"94d82e64-69f3-4ea9-bcae-a35f7229b4bf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- COSMOS · ground layer ---------- */\n  --cosmos-0:    #05001a;   /* deepest — corners, gutters */\n  --cosmos:      #0b0520;   /* primary background */\n  --cosmos-2:    #140932;   /* elevated panels */\n  --cosmos-3:    #1d1246;   /* card hover */\n  --nebula-pink: #6b1a5c;   /* top-left flyer wash */\n  --nebula-blue: #1a1a6b;   /* bottom flyer wash */\n\n  /* ---------- ZONES · the 3 LUMIIA worlds ---------- */\n  --exp:       #4dd9e8;     /* Expériences (cyan) */\n  --exp-2:     #8fe9f2;\n  --bar:       #d946ef;     /* Bar (magenta) */\n  --bar-2:     #e879f9;\n  --studios:   #a855f7;     /* Studios (violet) */\n  --studios-2: #c084fc;\n\n  /* ---------- ACCENT · electric lime ---------- */\n  --lime:      #b8ff3c;     /* \"&\", \"Nouveau\", CTA arrow */\n  --lime-2:    #d4ff7a;\n\n  /* ---------- TEXT ---------- */\n  --ink:       #ffffff;      /* primary on cosmos */\n  --ink-soft:  #c9c2e8;      /* secondary, body */\n  --ink-mute:  rgba(255,255,255,0.55);\n  --ink-faint: rgba(255,255,255,0.35);\n\n  /* ---------- TINTS (15% translucent accents) ---------- */\n  --exp-tint:     rgba(77,217,232,0.15);\n  --bar-tint:     rgba(217,70,239,0.15);\n  --studios-tint: rgba(168,85,247,0.15);\n  --lime-tint:    rgba(184,255,60,0.15);\n\n  /* ---------- BRAND GRADIENTS ---------- */\n  --ring-gradient: conic-gradient(\n    from 220deg,\n    var(--studios) 0%, var(--bar) 25%,\n    var(--exp) 55%, var(--studios) 85%, var(--studios) 100%\n  );\n  --cosmos-wash: radial-gradient(\n    ellipse 80% 60% at 20% 15%, rgba(217,70,239,0.35), transparent 55%),\n    radial-gradient(ellipse 90% 70% at 80% 10%, rgba(168,85,247,0.28), transparent 60%),\n    radial-gradient(ellipse 100% 80% at 50% 90%, rgba(26,26,107,0.6), transparent 70%),\n    linear-gradient(180deg, #0b0520, #05001a);\n\n  /* ---------- TYPOGRAPHY ---------- */\n  --ff-brand:   'Geometos Soft Ultra', system-ui, sans-serif;\n  --ff-rust:    'Zing Rust', 'Geometos Soft Ultra', system-ui, sans-serif;\n  --ff-body:    'Poppins', system-ui, sans-serif;\n\n  --fs-hero:    clamp(3rem, 9vw, 6.5rem);\n  --fs-h1:      clamp(2.2rem, 5vw, 4rem);\n  --fs-h2:      clamp(1.6rem, 3.5vw, 2.4rem);\n  --fs-h3:      1.3rem;\n  --fs-lead:    1.1rem;\n  --fs-body:    1rem;\n  --fs-small:   0.85rem;\n  --fs-micro:   0.7rem;\n\n  --fw-body:    400;\n  --fw-medium:  600;\n  --fw-bold:    800;\n\n  /* ---------- SPACING ---------- */\n  --s-1:  0.25rem;\n  --s-2:  0.5rem;\n  --s-3:  0.75rem;\n  --s-4:  1rem;\n  --s-5:  1.5rem;\n  --s-6:  2rem;\n  --s-7:  3rem;\n  --s-8:  4rem;\n  --s-9:  6rem;\n\n  /* ---------- RADII · LUMIIA is generously rounded ---------- */\n  --r-sm:   6px;\n  --r-md:   14px;\n  --r-lg:   24px;\n  --r-xl:   40px;\n  --r-pill: 999px;\n\n  /* ---------- GLOW ---------- */\n  --glow-exp:     0 0 24px rgba(77,217,232,0.55);\n  --glow-bar:     0 0 24px rgba(217,70,239,0.55);\n  --glow-studios: 0 0 24px rgba(168,85,247,0.55);\n  --glow-lime:    0 0 24px rgba(184,255,60,0.5);\n\n  /* ---------- MOTION ---------- */\n  --ease:     cubic-bezier(0.22, 0.61, 0.36, 1);\n  --dur-fast: 150ms;\n  --dur:      250ms;\n}\n\n/* ---------- BASE ---------- */\nhtml, body {\n  margin: 0; padding: 0;\n  background: var(--cosmos);\n  color: var(--ink);\n  font-family: var(--ff-body);\n  font-weight: var(--fw-body);\n  line-height: 1.5;\n}\nbody { background: var(--cosmos-wash); background-attachment: fixed; min-height: 100vh; }\n\nh1, h2, h3, .brand {\n  font-family: var(--ff-brand);\n  font-weight: 900;\n  letter-spacing: 0.01em;\n  text-transform: uppercase;\n  margin: 0;\n  line-height: 1;\n}\nh1 { font-size: var(--fs-h1); }\nh2 { font-size: var(--fs-h2); }\nh3 { font-size: var(--fs-h3); letter-spacing: 0.04em; }\n\n.lead { font-size: var(--fs-lead); color: var(--ink-soft); }\n.italic-quote { font-style: italic; color: var(--exp-2); }\n.ampersand { color: var(--lime); font-family: var(--ff-brand); }\n\nem { color: var(--exp); font-style: italic; font-weight: 600; }\nstrong { font-weight: 700; color: var(--ink); }\n\n/* Zing Rust utility — section titles, decorative callouts, posters. */\n.rust {\n  font-family: var(--ff-rust);\n  font-weight: 400;\n  text-transform: uppercase;\n  letter-spacing: 0.03em;\n}\n\n/* Neon ring — the flyer's signature icon container.\n   Implemented with background-clip: the conic gradient paints the border\n   area, and a solid cosmos disc fills the inside via content-box clip. */\n.ring {\n  width: 72px; height: 72px; border-radius: 50%;\n  display: inline-flex; align-items: center; justify-content: center;\n  color: var(--ink);\n  position: relative;\n  padding: 5px;                 /* ring thickness */\n  background:\n    linear-gradient(var(--cosmos), var(--cosmos)) padding-box,\n    var(--ring-gradient) border-box;\n  border: 5px solid transparent;\n  box-sizing: border-box;\n  box-shadow:\n    0 0 18px rgba(217,70,239,0.35),\n    0 0 28px rgba(77,217,232,0.25);\n}\n.ring > * { position: relative; z-index: 1; }\n<\u002Fstyle>\n\n  \n\n  <style>\n    :root { --page-pad: clamp(1.5rem, 4vw, 3.5rem); }\n    body { min-height: 100vh; padding: var(--page-pad); }\n    .wrap { max-width: 1200px; margin: 0 auto; }\n\n    header { display: grid; grid-template-columns: 1fr auto; gap: 2rem; align-items: center; padding: 2rem 0 3rem; border-bottom: 1px solid rgba(255,255,255,0.08); }\n    header img { max-width: 260px; height: auto; }\n    header .meta { text-align: right; font-family: var(--ff-body); font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-mute); line-height: 1.8; }\n    header .meta strong { color: var(--lime); display: block; font-weight: 700; }\n\n    .hero { padding: 4rem 0 3rem; }\n    .hero h1 { font-family: var(--ff-brand); font-size: clamp(3rem, 8vw, 6rem); line-height: 0.95; letter-spacing: 0.02em; color: #fff; margin: 0 0 1.2rem; text-transform: uppercase; }\n    .hero h1 .amp { color: var(--lime); }\n    .hero p { font-family: var(--ff-body); font-size: 1.15rem; line-height: 1.6; color: var(--ink-soft); max-width: 56ch; margin: 0; }\n    .hero p em { color: var(--exp); font-style: italic; }\n\n    section { padding: 3.5rem 0; border-top: 1px solid rgba(255,255,255,0.06); }\n    .section-head { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 2rem; }\n    .section-num { font-family: var(--ff-body); font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--lime); font-weight: 700; }\n    .section-head h2 { font-family: var(--ff-brand); font-size: clamp(1.8rem, 3.5vw, 2.6rem); color: #fff; letter-spacing: 0.02em; text-transform: uppercase; }\n\n    /* zones */\n    .zones { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }\n    .zone { border-radius: var(--r-lg); padding: 1.6rem 1.4rem 1.4rem; background: rgba(20,9,50,0.55); border: 1px solid rgba(255,255,255,0.06); position: relative; overflow: hidden; }\n    .zone::before { content:\"\"; position:absolute; top:0; left:0; right:0; height:4px; }\n    .zone.e::before { background: var(--exp); }\n    .zone.b::before { background: var(--bar); }\n    .zone.s::before { background: var(--studios); }\n    .zone h3 { font-family: var(--ff-brand); font-size: 1.3rem; color: #fff; letter-spacing: 0.04em; margin: 0 0 0.4rem; }\n    .zone .tag { font-family: var(--ff-body); font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700; }\n    .zone.e .tag { color: var(--exp); }\n    .zone.b .tag { color: var(--bar); }\n    .zone.s .tag { color: var(--studios); }\n    .zone p { font-family: var(--ff-body); font-size: 0.88rem; color: var(--ink-soft); line-height: 1.55; margin: 0.8rem 0 0; }\n\n    /* palette */\n    .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }\n    .sw { border-radius: var(--r-md); padding: 1rem 1rem 0.9rem; min-height: 120px; display: flex; flex-direction: column; justify-content: space-between; }\n    .sw .n { font-family: var(--ff-brand); font-size: 1rem; letter-spacing: 0.04em; text-transform: uppercase; }\n    .sw .h { font-family: var(--ff-body); font-size: 0.62rem; letter-spacing: 0.1em; opacity: 0.85; }\n    .sw.dark { color: #0b0520; }\n    .sw.light { color: #fff; }\n\n    /* type */\n    .type-row { display: grid; grid-template-columns: 140px 1fr; gap: 1.4rem; align-items: baseline; padding: 1rem 0; border-bottom: 1px dashed rgba(255,255,255,0.06); }\n    .type-row:last-child { border-bottom: none; }\n    .type-row .k { font-family: var(--ff-body); font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); }\n    .type-geo  { font-family: var(--ff-brand); font-size: 2.4rem; text-transform: uppercase; letter-spacing: 0.02em; color: #fff; line-height: 1; }\n    .type-rust { font-family: var(--ff-rust);  font-size: 2rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--exp); line-height: 1; }\n    .type-body { font-family: var(--ff-body); font-size: 1rem; color: var(--ink-soft); }\n    .type-italic { font-family: var(--ff-body); font-style: italic; font-size: 1.05rem; color: var(--exp-2); }\n\n    /* components row */\n    .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }\n    .comp { background: rgba(20,9,50,0.55); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--r-lg); padding: 1.4rem; }\n    .comp .k { font-family: var(--ff-body); font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 0.9rem; }\n\n    /* pill group */\n    .pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }\n    .zone-pill { font-family: var(--ff-brand); font-size: 0.7rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.45rem 1rem; border-radius: var(--r-pill); }\n    .zone-pill.e { background: var(--exp); color: #0b0520; }\n    .zone-pill.b { background: var(--bar); color: #fff; }\n    .zone-pill.s { background: var(--studios); color: #fff; }\n    .zone-pill.l { background: var(--lime); color: #0b0520; }\n\n    .cta { display: flex; align-items: center; gap: 0.9rem; }\n    .cta-arrow { width: 54px; height: 46px; background: var(--lime); border-radius: 18px 8px 8px 18px; display: flex; align-items: center; justify-content: center; box-shadow: var(--glow-lime); }\n    .cta-arrow svg { width: 22px; height: 22px; }\n    .cta-label { font-family: var(--ff-brand); font-size: 0.9rem; letter-spacing: 0.06em; color: var(--exp); text-transform: uppercase; border-bottom: 2px solid var(--exp); padding-bottom: 2px; }\n\n    /* ring icons */\n    .rings { display: flex; gap: 1.2rem; align-items: center; justify-content: flex-start; flex-wrap: wrap; }\n    .ring-xl { width: 84px; height: 84px; padding: 6px; border-width: 6px; font-size: 1.8rem; }\n\n    /* experience card example */\n    .exp-card { display: flex; gap: 1rem; align-items: flex-start; }\n    .exp-card h4 { font-family: var(--ff-brand); font-size: 1rem; color: #fff; margin: 0 0 0.3rem; letter-spacing: 0.04em; }\n    .exp-card p { font-family: var(--ff-body); font-style: italic; font-size: 0.85rem; color: var(--exp-2); margin: 0; line-height: 1.45; }\n\n    footer { padding: 3rem 0 1rem; text-align: center; font-family: var(--ff-body); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-faint); }\n    footer strong { color: var(--lime); }\n\n    @media (max-width: 720px) {\n      .zones, .comp-grid { grid-template-columns: 1fr; }\n      .swatches { grid-template-columns: repeat(2, 1fr); }\n      header { grid-template-columns: 1fr; }\n      header .meta { text-align: left; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"wrap\">\n\n    <header>\n      <img src=\"bfbcb284-6089-4d30-8d00-9d9591085812\" alt=\"LUMIIA\">\n      <div class=\"meta\">\n        <strong>Design System · v1<\u002Fstrong>\n        Avril 2026 · Aouste-sur-Sye<br>\n        Extrait du flyer officiel\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <section class=\"hero\">\n      <h1>L'atelier de<br>l'émerveillement<span class=\"amp\">.<\u002Fspan><\u002Fh1>\n      <p>Trois mondes sous un même toit — <em>Expériences<\u002Fem>, <em>Bar<\u002Fem> et <em>Studios<\u002Fem>. Un système cosmique construit à partir du flyer officiel LUMIIA : palette néon, typographie Geometos Soft Ultra, anneaux lumineux, appels à l'action en pilule lime.<\u002Fp>\n    <\u002Fsection>\n\n    <section>\n      <div class=\"section-head\"><span class=\"section-num\">01<\u002Fspan><h2>Les 3 mondes<\u002Fh2><\u002Fdiv>\n      <div class=\"zones\">\n        <div class=\"zone e\">\n          <span class=\"tag\">Cyan · #4dd9e8<\u002Fspan>\n          <h3>Expériences<\u002Fh3>\n          <p>Action &amp; escape games. Hollywood Super Green, Karaoké Room, Défoule Room, Enigmatik Games.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"zone b\">\n          <span class=\"tag\">Magenta · #d946ef<\u002Fspan>\n          <h3>Bar<\u002Fh3>\n          <p>Tout un autre monde. Cocktails, bières locales, tapas &amp; gourmandises. Entrée gratuite.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"zone s\">\n          <span class=\"tag\">Violet · #a855f7<\u002Fspan>\n          <h3>Studios<\u002Fh3>\n          <p>Ça tourne ! Concerts filmés, live sessions, diffusion en direct, open mics, spectacles.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section>\n      <div class=\"section-head\"><span class=\"section-num\">02<\u002Fspan><h2>Palette néon<\u002Fh2><\u002Fdiv>\n      <div class=\"swatches\">\n        <div class=\"sw dark\" style=\"background:var(--exp);\">\n          <div class=\"n\">Cyan<\u002Fdiv><div class=\"h\">#4dd9e8 · Expériences<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"sw light\" style=\"background:var(--bar);\">\n          <div class=\"n\">Magenta<\u002Fdiv><div class=\"h\">#d946ef · Bar<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"sw light\" style=\"background:var(--studios);\">\n          <div class=\"n\">Violet<\u002Fdiv><div class=\"h\">#a855f7 · Studios<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"sw dark\" style=\"background:var(--lime);\">\n          <div class=\"n\">Lime<\u002Fdiv><div class=\"h\">#b8ff3c · Accent &amp; CTA<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section>\n      <div class=\"section-head\"><span class=\"section-num\">03<\u002Fspan><h2>Typographie<\u002Fh2><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"k\">Brand · Geometos<\u002Fspan><span class=\"type-geo\">LUMIIA<\u002Fspan><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"k\">Sections · Zing Rust<\u002Fspan><span class=\"type-rust\">L'ATELIER DE L'ÉMERVEILLEMENT<\u002Fspan><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"k\">Pull-quote · italic<\u002Fspan><span class=\"type-italic\">Deviens acteur. Caméra. Action !<\u002Fspan><\u002Fdiv>\n      <div class=\"type-row\"><span class=\"k\">Body · Poppins<\u002Fspan><span class=\"type-body\">Un vrai fond vert, une régie live, une équipe qui filme, monte, diffuse. Tu repars avec ton film.<\u002Fspan><\u002Fdiv>\n    <\u002Fsection>\n\n    <section>\n      <div class=\"section-head\"><span class=\"section-num\">04<\u002Fspan><h2>Composants<\u002Fh2><\u002Fdiv>\n      <div class=\"comp-grid\">\n\n        <div class=\"comp\">\n          <div class=\"k\">Anneaux néon · icônes<\u002Fdiv>\n          <div class=\"rings\">\n            <span class=\"ring ring-xl\">🎬<\u002Fspan>\n            <span class=\"ring ring-xl\">🎤<\u002Fspan>\n            <span class=\"ring ring-xl\">⚡<\u002Fspan>\n            <span class=\"ring ring-xl\">🔍<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"comp\">\n          <div class=\"k\">Badges de zone<\u002Fdiv>\n          <div class=\"pills\">\n            <span class=\"zone-pill e\">Expériences<\u002Fspan>\n            <span class=\"zone-pill b\">Bar<\u002Fspan>\n            <span class=\"zone-pill s\">Studios<\u002Fspan>\n            <span class=\"zone-pill l\">Nouveau<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"comp\">\n          <div class=\"k\">Appel à l'action<\u002Fdiv>\n          <div class=\"cta\">\n            <div class=\"cta-arrow\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\">\n                <path d=\"M8 4 L18 12 L8 20\" stroke=\"#0b0520\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <div class=\"cta-label\">RÉSERVEZ VOS SESSIONS !<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"comp\">\n          <div class=\"k\">Carte d'expérience<\u002Fdiv>\n          <div class=\"exp-card\">\n            <span class=\"ring ring-xl\" style=\"flex-shrink:0;\">🎬<\u002Fspan>\n            <div>\n              <h4>HOLLYWOOD SUPER GREEN<\u002Fh4>\n              <p>Deviens acteur.<br>Caméra. Action !<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer>\n      <strong>LUMIIA<\u002Fstrong> · Espaces de jeux · Bar immersif &amp; Studios · Aouste-sur-Sye\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
